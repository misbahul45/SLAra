networks:
  slara_net:
    driver: bridge

volumes:
  mongo_data:
  neo4j_data:
  redis_data:
  qdrant_data:
  kafka_data:

services:
  gateway:
    image: nginx:alpine
    container_name: slara_gateway
    ports:
      - "80:80"
    volumes:
      - ../services/gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - agent
      - data
      - ai
      - app
    networks:
      - slara_net
  agent:
    container_name: slara_agent
    env_file:
      - ../.env
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - slara_net

  data:
    container_name: slara_data
    env_file:
      - ../.env
    depends_on:
      mongodb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - slara_net

  ai:
    container_name: slara_ai
    env_file:
      - ../.env
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - slara_net

  app:
    container_name: slara_app
    env_file:
      - ../.env
    networks:
      - slara_net
  mongodb:
    image: mongo:latest
    container_name: slara_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - slara_net

  neo4j:
    image: neo4j:latest
    container_name: slara_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    env_file:
      - ../.env
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - slara_net

  redis:
    image: redis:alpine
    container_name: slara_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - slara_net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: slara_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - slara_net
  kafka:
    image: bitnami/kafka:latest
    container_name: slara_kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_NODE_ID=1
      - ALLOW_PLAINTEXT_LISTENER=yes
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - slara_net
