networks:
  slara_net:
    driver: bridge

volumes:
  # mongo_data:
  # neo4j_data:
  # redis_data:
  # qdrant_data:
  # kafka_data:

services:
  gateway:
    image: nginx:alpine
    container_name: slara_gateway
    ports:
      - "80:80"
    volumes:
      - ../services/gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      agent:
        condition: service_healthy
      data:
        condition: service_healthy
      ai:
        condition: service_healthy
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - slara_net

  agent:
    container_name: slara_agent
    env_file:
      - ../.env
    depends_on:
      # qdrant:
      #   condition: service_healthy
      # redis:
      #   condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - slara_net

  data:
    container_name: slara_data
    env_file:
      - ../.env
    depends_on:
      # mongodb:
      #   condition: service_healthy
      # neo4j:
      #   condition: service_healthy
      # redis:
      #   condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - slara_net

  ai:
    container_name: slara_ai
    env_file:
      - ../.env
    environment:
      - MODEL_DIR=/app/models
    volumes:
      # Model cache: host dir mounted into container (read-only).
      # Add models by dropping files here, no image rebuild needed.
      - ../services/ai/models:/app/models:ro
    depends_on:
      kafka:
        condition: service_healthy
      # redis:
      #   condition: service_healthy
    healthcheck:
      # Image ai = python:3.12-slim: TIDAK punya wget maupun curl (kasus yang sama dgn B1 di
      # qdrant, tapi ini di jalur demo). Pakai python stdlib — satu-satunya yang dijamin ada.
      # Startup ~25-37s (init SHAP TreeExplainer) -> start_period 45s, bukan 30s.
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s
    networks:
      - slara_net

  app:
    container_name: slara_app
    env_file:
      - ../.env
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - slara_net

