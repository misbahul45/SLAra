events {
    worker_connections 1024;
}

http {
    # Definisi upstream untuk masing-masing service
    upstream agent_service {
        server agent:3000;
    }
    upstream data_service {
        server data:8081;
    }
    upstream ai_service {
        server ai:8000;
    }
    # Frontend dashboard. Prod: app di-serve pada :3000.
    # Dev: dashboard diakses langsung di http://localhost:5173 (Vite HMR), bukan lewat gateway.
    upstream app_service {
        server app:3000;
    }

    server {
        listen 80;
        server_name localhost;

        # Konfigurasi dasar WebSocket yang akan di-inherit oleh location di bawahnya
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Routing ke Agent Service (Hono)
        location /api/agent/ {
            proxy_pass http://agent_service/;
        }

        # Kontrak FE (apps/app/app/lib/api.ts): browser memanggil /api/v1/* same-origin.
        # Di dev peran ini dimainkan proxy Vite (vite.config.ts); di prod gateway-lah
        # yang meneruskan ke agent TANPA rewrite path (agent serve /api/v1/...).
        location /api/v1/ {
            proxy_pass http://agent_service;
        }

        # Route Optimization membaca M4 langsung dari ai (bukan lewat agent):
        # browser fetch /internal/m4/routes same-origin — teruskan apa adanya.
        location /internal/ {
            proxy_pass http://ai_service;
        }

        # Routing ke Data Service (Golang)
        location /api/data/ {
            proxy_pass http://data_service/;
        }

        # Routing ke AI Service (FastAPI)
        location /api/ai/ {
            proxy_pass http://ai_service/;
        }

        # Routing ke Frontend Dashboard (React Router, prod)
        location / {
            proxy_pass http://app_service/;
        }
    }
}