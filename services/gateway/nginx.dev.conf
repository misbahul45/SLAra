events {
    worker_connections 1024;
}

http {
    # Definisi upstream untuk masing-masing service
    upstream agent_service {
        server agent:3000;
    }
    upstream data_service {
        server data:8081;
    }
    upstream ai_service {
        server ai:8000;
    }
    # Dev override: Vite dev server (React Router) listen di 5173, bukan 3000.
    upstream app_service {
        server app:5173;
    }

    server {
        listen 80;
        server_name localhost;

        # Konfigurasi dasar WebSocket yang akan di-inherit oleh location di bawahnya
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Routing ke Agent Service (Hono)
        location /api/agent/ {
            proxy_pass http://agent_service/;
        }

        # Routing ke Data Service (Golang)
        location /api/data/ {
            proxy_pass http://data_service/;
        }

        # Routing ke AI Service (FastAPI)
        location /api/ai/ {
            proxy_pass http://ai_service/;
        }

        # Routing ke Frontend Dashboard (Vite dev + HMR)
        location / {
            proxy_pass http://app_service/;
        }
    }
}
